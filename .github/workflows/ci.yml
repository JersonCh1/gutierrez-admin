name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    name: Typecheck + Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate
        env:
          # Placeholder solo para generate; no se conecta a Neon.
          DATABASE_URL: postgres://user:pass@localhost:5432/db?schema=public

      - name: TypeScript strict
        run: npx tsc --noEmit

      - name: ESLint
        run: npm run lint
